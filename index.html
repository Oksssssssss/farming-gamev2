<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌾 Little Valley Farm ULTRA+</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body{
  margin:0;
  background:#0b0f1f;
  color:#fff;
  font-family:'Press Start 2P';
  overflow:hidden;
  cursor:url('https://cur.cursors-4u.net/games/gam-14/gam1334.cur'),auto;
}

.header{
  background:#1a0f1f;
  padding:10px;
  display:flex;
  justify-content:space-around;
  border-bottom:5px solid #8b0000;
  font-size:12px;
}

.main{display:flex;height:calc(100vh - 70px);}
.grid{display:grid;gap:4px;margin:auto;}

.plot{
  width:40px;height:40px;
  background:#1c2b4a;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  border-radius:6px;
}

.sidebar{
  width:260px;
  background:#140b1a;
  padding:10px;
  overflow:auto;
  border-left:3px solid #8b0000;
}

button,.shop-item,.tool{
  width:100%;
  margin:4px 0;
  padding:8px;
  background:#1c2b4a;
  border:none;
  color:white;
  cursor:pointer;
  font-size:10px;
}

.tool.active{outline:2px solid #8b0000;}
.selected-seed{outline:2px solid #00bfff;}

#loginScreen{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:2000;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
<h2>🌾 Farm Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="loginMsg"></p>
</div>

<!-- GAME -->
<div class="header">
<div>Day <span id="day">1</span></div>
<div>💰 <span id="money">100</span></div>
<div>⚡ <span id="energy">100</span></div>
<div>🌾 Size <span id="size">5x5</span></div>
</div>

<div class="main">
<div id="grid" class="grid"></div>

<div class="sidebar">
<h4>🌱 Seeds</h4>
<div id="seedList"></div>

<h4>🛒 Buy Seeds</h4>
<div class="shop-item" onclick="buySeed('carrot')">🥕 Carrot $20</div>
<div class="shop-item" onclick="buySeed('corn')">🌽 Corn $40</div>
<div class="shop-item" onclick="buySeed('pumpkin')">🎃 Pumpkin $80</div>
<div class="shop-item" onclick="buySeed('strawberry')">🍓 Strawberry $30</div>
<div class="shop-item" onclick="buySeed('tomato')">🍅 Tomato $60</div>
<div class="shop-item" onclick="buySeed('sunflower')">🌻 Sunflower $120</div>
<div class="shop-item" onclick="buySeed('chili')">🌶️ Chili $90</div>

<h4>💧 Water</h4>
<div class="shop-item" onclick="upgradeWater()">Speed ($60)</div>
<div class="shop-item" onclick="buyAutoWater()">Auto ($150)</div>

<h4>📈 Upgrades</h4>
<div class="shop-item" onclick="upgradeFarm()">Expand ($<span id="upgradeCost">1000</span>)</div>

<h4>🧰 Tools</h4>
<div class="tool" id="tool_hoe" onclick="selectTool('hoe')">🪓 Till</div>
<div class="tool" id="tool_plant" onclick="selectTool('plant')">🌱 Plant</div>
<div class="tool" id="tool_water" onclick="selectTool('water')">💧 Water</div>
<div class="tool" id="tool_harvest" onclick="selectTool('harvest')">👋 Harvest</div>

<button onclick="nextDay()">🌙 Next Day</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<script>
let money=100,energy=100,day=1;
let tool='hoe',selectedSeed=null;
let size=5,maxSize=20,upgradeCost=1000;
let currentUser=null;

let seeds={carrot:0,corn:0,pumpkin:0,strawberry:0,tomato:0,sunflower:0,chili:0};
let waterBoost=1,autoWater=false;

const sounds={
 click:new Audio('https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b0b2c.mp3'),
 plant:new Audio('https://cdn.pixabay.com/audio/2022/03/15/audio_2b6c8637b9.mp3'),
 harvest:new Audio('https://cdn.pixabay.com/audio/2022/03/15/audio_8b5e2e6b69.mp3'),
 error:new Audio('https://cdn.pixabay.com/audio/2022/03/15/audio_cedb31c7c5.mp3'),
 upgrade:new Audio('https://cdn.pixabay.com/audio/2022/03/15/audio_4f0b90b9b4.mp3'),
 day:new Audio('https://cdn.pixabay.com/audio/2022/03/15/audio_9b1d6f6d3b.mp3')
};

const crops={
 carrot:{grow:1,value:25,icon:'🥕'},
 corn:{grow:3,value:80,icon:'🌽'},
 pumpkin:{grow:5,value:220,icon:'🎃'},
 strawberry:{grow:2,value:50,icon:'🍓'},
 tomato:{grow:3,value:100,icon:'🍅'},
 sunflower:{grow:6,value:350,icon:'🌻'},
 chili:{grow:4,value:180,icon:'🌶️'}
};

let farm=[];

function createFarm(){
 farm=Array(size*size).fill().map(()=>({tilled:false,type:null,growth:0,watered:false}));
}

function updateUI(){
 moneyEl.textContent=money;
 energyEl.textContent=energy;
 dayEl.textContent=day;
 sizeEl.textContent=size+"x"+size;
 upgradeCostEl.textContent=upgradeCost;
}

function renderSeeds(){
 seedList.innerHTML='';
 Object.keys(seeds).forEach(s=>{
  if(seeds[s]>0){
   let d=document.createElement('div');
   d.className='shop-item '+(selectedSeed===s?'selected-seed':'');
   d.textContent=`${crops[s].icon} ${s} x${seeds[s]}`;
   d.onclick=()=>{selectedSeed=s;renderSeeds();};
   seedList.appendChild(d);
  }
 });
}

function render(){
 grid.style.gridTemplateColumns=`repeat(${size},40px)`;
 grid.innerHTML='';
 farm.forEach((p,i)=>{
  let d=document.createElement('div');
  d.className='plot';

  let icon='🟫';
  if(p.tilled) icon='🌱';
  if(p.type && p.growth>=crops[p.type].grow) icon=crops[p.type].icon;
  else if(p.type) icon='🌿';

  d.textContent=icon;
  d.onclick=()=>clickPlot(i);
  grid.appendChild(d);
 });
}

function clickPlot(i){
 let p=farm[i];
 if(energy<=0){sounds.error.play();return;}

 if(tool==='hoe'&&!p.tilled&&!p.type){p.tilled=true;energy-=2;}
 if(tool==='plant'&&selectedSeed&&p.tilled&&!p.type){
  if(seeds[selectedSeed]<=0){sounds.error.play();return;}
  seeds[selectedSeed]--;p.type=selectedSeed;energy-=3;
 }
 if(tool==='water'&&p.type&&!p.watered){p.watered=true;energy-=2;}
 if(tool==='harvest'&&p.type&&p.growth>=crops[p.type].grow){
  money+=crops[p.type].value;

  if(Math.random()<0.1){money+=100;alert("💎 Rare!");}

  p.type=null;p.growth=0;p.watered=false;p.tilled=false;
  energy-=2;
 }

 saveGame();
 updateUI();render();renderSeeds();
}

function nextDay(){
 day++;energy=100;sounds.day.play();

 let r=Math.random();
 if(r<0.2){alert("🌧️ Rain!");farm.forEach(p=>p.watered=true);}
 else if(r<0.3){alert("🐛 Bugs!");farm.forEach(p=>{if(p.type&&Math.random()<0.3)p.type=null;});}
 else if(r<0.4){money+=100;alert("💰 Bonus!");}

 farm.forEach(p=>{
  if(p.type&&(p.watered||autoWater))p.growth+=waterBoost;
  p.watered=autoWater;
 });

 saveGame();
 updateUI();render();
}

function buySeed(type){
 let price={carrot:20,corn:40,pumpkin:80,strawberry:30,tomato:60,sunflower:120,chili:90}[type];
 if(money<price){sounds.error.play();return;}
 money-=price;seeds[type]+=2;
 saveGame();updateUI();renderSeeds();
}

function upgradeWater(){
 if(money<60)return;
 money-=60;waterBoost++;saveGame();updateUI();
}

function buyAutoWater(){
 if(money<150)return;
 money-=150;autoWater=true;saveGame();updateUI();
}

function upgradeFarm(){
 if(money<upgradeCost)return;
 money-=upgradeCost;upgradeCost*=2;size+=5;
 createFarm();saveGame();updateUI();render();
}

function selectTool(t){
 tool=t;
 document.querySelectorAll('.tool').forEach(e=>e.classList.remove('active'));
 document.getElementById('tool_'+t).classList.add('active');

 if(t==='hoe')document.body.style.cursor='crosshair';
 if(t==='plant')document.body.style.cursor='pointer';
 if(t==='water')document.body.style.cursor='cell';
 if(t==='harvest')document.body.style.cursor='grab';
}

function saveGame(){
 if(!currentUser)return;
 localStorage.setItem("farm_"+currentUser,JSON.stringify({
 money,energy,day,seeds,farm,size,waterBoost,autoWater,upgradeCost
 }));
}

function loadGame(){
 let data=localStorage.getItem("farm_"+currentUser);
 if(!data)return;
 let s=JSON.parse(data);

 money=s.money;energy=s.energy;day=s.day;
 seeds=s.seeds;farm=s.farm;
 size=s.size;waterBoost=s.waterBoost;
 autoWater=s.autoWater;upgradeCost=s.upgradeCost;
}

function login(){
 let u=username.value,p=password.value;

 if(u==="Zan"&&p==="owner"){
  currentUser=u;
  loadGame();
  money+=500;
  alert("👑 Owner bonus!");
 }
 else{
  currentUser=u;
  loadGame();
 }

 loginScreen.style.display="none";
 updateUI();render();renderSeeds();
}

function logout(){
 saveGame();
 location.reload();
}

const moneyEl=document.getElementById('money');
const energyEl=document.getElementById('energy');
const dayEl=document.getElementById('day');
const sizeEl=document.getElementById('size');
const upgradeCostEl=document.getElementById('upgradeCost');
const grid=document.getElementById('grid');
const seedList=document.getElementById('seedList');

function init(){
 createFarm();
 render();renderSeeds();
 selectTool('hoe');
}
init();
</script>

</body>
</html>
